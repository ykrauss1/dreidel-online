<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סביבון — מקומי ואונליין</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&family=Secular+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#06080f; --bg-card:#0e1225; --bg-card-alt:#141938; --bg-input:#0a0d1a;
            --gold:#f5c842; --gold-dim:#b8912a; --gold-glow:rgba(245,200,66,0.25); --gold-glow-strong:rgba(245,200,66,0.5);
            --blue:#3d7aed; --blue-glow:rgba(61,122,237,0.25); --green:#34d399; --red:#f87171;
            --text:#e4e4f0; --text-dim:#7a7da0; --border:#1e2348; --border-light:#2a3060;
            --radius:14px; --radius-sm:8px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 15% 10%,rgba(61,122,237,0.06),transparent),radial-gradient(ellipse 500px 500px at 85% 85%,rgba(245,200,66,0.04),transparent);pointer-events:none}
        .app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:16px}
        .hidden{display:none!important}

        .header{text-align:center;padding:18px 0 6px}
        .header h1{font-family:'Secular One',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--gold);text-shadow:0 0 30px var(--gold-glow)}
        .header .sub{color:var(--text-dim);font-size:0.85rem;margin-top:2px;font-weight:300}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border:none;border-radius:var(--radius-sm);font-family:'Secular One',sans-serif;font-size:1rem;cursor:pointer;transition:all 0.2s}
        .btn:active{transform:scale(0.97)}
        .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#12141f;box-shadow:0 4px 15px var(--gold-glow)}
        .btn-gold:hover{box-shadow:0 6px 25px var(--gold-glow-strong);transform:translateY(-1px)}
        .btn-blue{background:linear-gradient(135deg,var(--blue),#2b5ecf);color:#fff;box-shadow:0 4px 15px var(--blue-glow)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:0.85rem;padding:7px 16px}
        .btn-outline:hover{border-color:var(--gold-dim);color:var(--gold)}
        .input,select.input{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:1rem;font-family:'Heebo',sans-serif;outline:none;width:100%;transition:border-color 0.2s}
        .input:focus{border-color:var(--gold-dim)}
        .form-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
        .form-row label{flex-shrink:0;font-weight:600;font-size:0.9rem;color:var(--text-dim);min-width:100px}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
        .section-title{font-family:'Secular One',sans-serif;color:var(--gold);font-size:1.2rem;text-align:center;margin-bottom:16px}
        .divider{border:none;border-top:1px solid var(--border);margin:16px 0}

        .mode-selector{display:flex;gap:14px;max-width:550px;margin:20px auto}
        .mode-card{flex:1;background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:24px 16px;text-align:center;cursor:pointer;transition:all 0.25s}
        .mode-card:hover{border-color:var(--border-light);background:var(--bg-card-alt)}
        .mode-card.selected{border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
        .mode-card .icon{font-size:2.4rem;margin-bottom:8px} .mode-card .label{font-family:'Secular One',sans-serif;font-size:1.1rem} .mode-card .desc{font-size:0.8rem;color:var(--text-dim);margin-top:4px}
        .mode-selector.collapsed .mode-card{display:none} .mode-selector.collapsed .back-wrap{display:block} .back-wrap{display:none;text-align:center}

        .setup-panel{max-width:500px;margin:16px auto}
        .player-name-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
        .player-name-row .badge{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0}
        .room-code-display{font-family:'Secular One',sans-serif;font-size:2.6rem;letter-spacing:10px;color:var(--gold);text-align:center;text-shadow:0 0 20px var(--gold-glow);padding:16px;margin:10px 0;background:var(--bg-input);border-radius:var(--radius);border:1px dashed var(--border-light);user-select:all}
        .lobby-players{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
        .lobby-player{background:var(--bg-card-alt);border:1px solid var(--border);border-radius:20px;padding:6px 16px;font-size:0.85rem;display:flex;align-items:center;gap:6px}
        .lobby-player .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .lobby-player.host::after{content:'👑';margin-right:4px;font-size:0.8rem}
        .tab-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
        .tab-btn{padding:7px 18px;border-radius:20px;font-size:0.85rem;background:var(--bg-input);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:'Heebo',sans-serif;transition:all 0.2s}
        .tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

        /* ══ GAME: 2 COLUMN LAYOUT ══ */
        .game-layout{display:grid;grid-template-columns:1fr 240px;gap:14px;align-items:start}
        .game-top{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
        .pot-box{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--bg-card),var(--bg-card-alt));border:1px solid var(--border);border-radius:var(--radius);padding:10px 20px}
        .pot-box .emoji{font-size:1.6rem} .pot-label{font-size:0.75rem;color:var(--text-dim)} .pot-val{font-family:'Secular One',sans-serif;font-size:1.5rem;color:var(--gold)}
        .turn-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 18px;font-size:0.9rem} .turn-box strong{color:var(--gold)}

        .game-main{display:flex;flex-direction:column;align-items:center;gap:10px}
        .dreidel-zone{display:flex;flex-direction:column;align-items:center;position:relative}
        .dreidel-wrap{perspective:800px;width:120px;height:180px;margin-bottom:4px;display:flex;align-items:center;justify-content:center}
        .dreidel-svg{width:120px;height:180px;filter:drop-shadow(0 0 15px var(--gold-glow));transition:transform 0.3s;transform-origin:center center}
        .dreidel-svg .body-rect{fill:var(--bg-card-alt);stroke:var(--gold);stroke-width:2}
        .dreidel-svg .body-tri{fill:var(--bg-card-alt);stroke:var(--gold);stroke-width:2}
        .dreidel-svg .handle{fill:var(--gold-dim);stroke:var(--gold);stroke-width:1.5}
        .dreidel-svg .handle-knob{fill:var(--gold);stroke:var(--gold-dim);stroke-width:1}
        .dreidel-svg .letter{font-family:'Secular One',sans-serif;font-size:36px;fill:var(--gold);text-anchor:middle;dominant-baseline:central}
        .dreidel-svg.spinning{animation:dreidel3d 0.18s linear infinite}
        @keyframes dreidel3d{
            0%{transform:rotateY(0deg)}
            25%{transform:rotateY(90deg) scaleX(0.2)}
            50%{transform:rotateY(180deg) scaleX(1)}
            75%{transform:rotateY(270deg) scaleX(0.2)}
            100%{transform:rotateY(360deg)}
        }
        .dreidel-svg.fall-right{animation:fall-r 0.6s ease-in forwards}
        .dreidel-svg.fall-left{animation:fall-l 0.6s ease-in forwards}
        @keyframes fall-r{
            0%{transform:rotate(0deg)}
            40%{transform:rotate(8deg)}
            70%{transform:rotate(75deg)}
            85%{transform:rotate(82deg)}
            100%{transform:rotate(78deg)}
        }
        @keyframes fall-l{
            0%{transform:rotate(0deg)}
            40%{transform:rotate(-8deg)}
            70%{transform:rotate(-75deg)}
            85%{transform:rotate(-82deg)}
            100%{transform:rotate(-78deg)}
        }
        .dreidel-svg.upright{animation:stand-up 0.4s ease-out forwards}
        @keyframes stand-up{
            0%{transform:rotate(var(--current-rot,0deg))}
            100%{transform:rotate(0deg)}
        }
        @keyframes dspin{0%{transform:rotateY(0) scale(1.05)}50%{transform:rotateY(180deg) scale(0.95)}100%{transform:rotateY(360deg) scale(1.05)}}
        .result-line{font-size:0.9rem;font-weight:600;min-height:20px;text-align:center;white-space:nowrap;margin-bottom:8px;margin-top:24px}
        .r-נ{color:var(--text-dim)} .r-ג{color:var(--green)} .r-ה{color:var(--blue)} .r-פ{color:var(--red)}
        .spin-btn{margin-top:6px;padding:10px 36px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#12141f;border:none;border-radius:10px;font-family:'Secular One',sans-serif;font-size:1.05rem;cursor:pointer;box-shadow:0 4px 15px var(--gold-glow);transition:all 0.2s}
        .spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 25px var(--gold-glow-strong)}
        .spin-btn:disabled{opacity:0.35;cursor:not-allowed}
        .waiting-text{color:var(--text-dim);font-size:0.85rem;margin-top:8px;text-align:center;animation:pulse 1.5s infinite}

        .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;width:100%}
        .p-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:10px 12px;transition:all 0.3s}
        .p-card.active{border-color:var(--gold);box-shadow:0 0 18px var(--gold-glow);background:var(--bg-card-alt)}
        .p-card.out{opacity:0.3} .p-card.winner{border-color:var(--gold)}
        .p-card .p-name{font-weight:700;font-size:0.85rem;display:flex;align-items:center;gap:4px;margin-bottom:2px}
        .p-card .p-name .crown{display:none} .p-card.winner .p-name .crown{display:inline}
        .p-card .p-amt{font-family:'Secular One',sans-serif;font-size:1.15rem;color:var(--gold)}
        .p-card .p-delta{font-size:0.75rem;min-height:16px;margin-top:1px}
        .p-delta.plus{color:var(--green)} .p-delta.minus{color:var(--red)} .p-delta.zero{color:var(--text-dim)}

        /* Sidebar */
        .game-sidebar{display:flex;flex-direction:column;gap:14px;grid-row:2/4}
        .sidebar-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
        .sidebar-panel h3{font-size:0.8rem;color:var(--text-dim);font-weight:400;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
        .video-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .video-tile{position:relative;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg-input);border:1px solid var(--border);aspect-ratio:4/3;max-height:100px}
        .video-tile video{width:100%;height:100%;object-fit:cover;display:block}
        .video-tile .vid-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:16px 8px 6px;font-size:0.75rem;color:#fff}
        .vid-controls{display:flex;gap:4px}
        .vid-btn{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;color:var(--text-dim);font-size:0.7rem;font-family:'Heebo',sans-serif;cursor:pointer;transition:all 0.2s}
        .vid-btn:hover{border-color:var(--blue);color:var(--blue)} .vid-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
        .vid-placeholder{text-align:center;padding:18px 8px;color:var(--text-dim);font-size:0.8rem}

        .log-entries{max-height:160px;overflow-y:auto}
        .log-entry{padding:3px 0;font-size:0.78rem;color:var(--text-dim);border-bottom:1px solid rgba(255,255,255,0.02)}

        .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center}
        .modal-bg.show{display:flex}
        .win-modal{background:var(--bg-card);border:2px solid var(--gold);border-radius:20px;padding:36px;text-align:center;box-shadow:0 0 80px var(--gold-glow-strong);max-width:380px;width:90%;animation:mpop 0.35s ease-out}
        @keyframes mpop{0%{transform:scale(0.6) translateY(30px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
        .win-modal .big-icon{font-size:3.5rem;margin-bottom:6px} .win-modal h2{font-family:'Secular One',sans-serif;color:var(--gold);font-size:1.5rem;margin-bottom:4px} .win-modal p{color:var(--text-dim);margin-bottom:16px}

        @media(max-width:768px){
            .mode-selector{flex-direction:column}
            .game-layout{grid-template-columns:1fr}
            .game-sidebar{grid-row:auto}
            .players-grid{grid-template-columns:repeat(2,1fr)}
        }
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>
<body>
<div class="app">
    <header class="header"><h1>🕎 משחק סביבון</h1><p class="sub">נ ג ה פ — מקומי או אונליין עם חברים!</p></header>

    <div id="modeScreen">
        <div class="mode-selector" id="modeSelector">
            <div class="back-wrap"><button class="btn btn-outline" onclick="resetMode()">◂ חזרה</button></div>
            <div class="mode-card" data-mode="local" onclick="selectMode('local')"><div class="icon">🎮</div><div class="label">מקומי</div><div class="desc">כל השחקנים על אותו מכשיר</div></div>
            <div class="mode-card" data-mode="online" onclick="selectMode('online')"><div class="icon">🌐</div><div class="label">אונליין</div><div class="desc">שלח קוד חדר לחברים</div></div>
        </div>
    </div>

    <div id="localSetup" class="setup-panel card hidden">
        <h2 class="section-title">משחק מקומי</h2>
        <div class="form-row"><label>שחקנים:</label><select id="localNumPlayers" class="input" onchange="renderLocalNames()"><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option></select></div>
        <div class="form-row"><label>סכום התחלתי:</label><input type="number" id="localStartAmt" class="input" value="100" min="10" step="10"></div>
        <hr class="divider"><div id="localNames"></div>
        <button class="btn btn-gold" style="width:100%;margin-top:16px" onclick="startLocalGame()">🎲 התחל!</button>
    </div>

    <div id="onlineSetup" class="hidden">
        <div id="onlineLobby" class="setup-panel card hidden">
            <h2 class="section-title">משחק אונליין</h2>
            <div class="tab-row"><button class="tab-btn active" id="tabCreate" onclick="showOnlineTab('create')">צור חדר</button><button class="tab-btn" id="tabJoin" onclick="showOnlineTab('join')">הצטרף</button></div>
            <div id="createPanel">
                <div class="form-row"><label>השם שלך:</label><input type="text" id="hostName" class="input" placeholder="שם..."></div>
                <div class="form-row"><label>סכום:</label><input type="number" id="onlineStartAmt" class="input" value="100" min="10" step="10"></div>
                <button class="btn btn-gold" style="width:100%;margin-top:10px" onclick="createRoom()">צור חדר</button>
            </div>
            <div id="joinPanel" class="hidden">
                <div class="form-row"><label>השם שלך:</label><input type="text" id="joinName" class="input" placeholder="שם..."></div>
                <div class="form-row"><label>קוד חדר:</label><input type="text" id="joinCode" class="input" placeholder="XXXX" maxlength="4" style="letter-spacing:6px;text-align:center;font-size:1.1rem" dir="ltr"></div>
                <button class="btn btn-blue" style="width:100%;margin-top:10px" onclick="joinRoom()">הצטרף</button>
            </div>
        </div>
        <div id="waitingRoom" class="setup-panel card hidden">
            <h2 class="section-title">ממתינים לשחקנים...</h2>
            <div class="room-code-display" id="roomCodeDisplay">----</div>
            <p style="text-align:center;color:var(--text-dim);font-size:0.8rem;margin-bottom:10px">שתף את הקוד עם החברים</p>
            <div class="lobby-players" id="lobbyPlayers"></div>
            <button class="btn btn-gold hidden" style="width:100%;margin-top:12px" id="startOnlineBtn" onclick="startOnlineGame()">🎲 התחל!</button>
        </div>
    </div>

    <!-- GAME -->
    <div class="hidden" id="gameScreen">
        <div class="game-layout">
            <div class="game-top">
                <div class="pot-box"><span class="emoji">🪙</span><div><div class="pot-label">קופה</div><div class="pot-val" id="potVal">0</div></div></div>
                <div class="turn-box" id="turnBox">תור: <strong>—</strong></div>
                <button class="btn btn-outline" onclick="location.reload()">משחק חדש</button>
            </div>
            <div class="game-main">
                <div class="dreidel-zone">
                    <div class="dreidel-wrap">
                        <svg class="dreidel-svg" id="dreidelSvg" viewBox="0 0 100 170" xmlns="http://www.w3.org/2000/svg">
                            <!-- Handle knob -->
                            <circle class="handle-knob" cx="50" cy="6" r="5"/>
                            <!-- Handle stick -->
                            <rect class="handle" x="46" y="10" width="8" height="40" rx="3"/>
                            <!-- Square body -->
                            <rect class="body-rect" x="15" y="52" width="70" height="70" rx="5"/>
                            <!-- Triangle bottom (starts exactly at bottom of square) -->
                            <polygon class="body-tri" points="20,122 80,122 50,162"/>
                            <!-- Letter inside square -->
                            <text class="letter" x="50" y="90" id="dreidelLetter">?</text>
                        </svg>
                    </div>
                    <div class="result-line" id="resultLine"></div>
                    <button class="spin-btn" id="spinBtn" onclick="doSpin()">סובב!</button>
                    <div class="waiting-text hidden" id="waitingMsg">ממתין לתור...</div>
                </div>
                <div class="players-grid" id="playersGrid"></div>
            </div>
            <div class="game-sidebar">
                <div class="sidebar-panel" id="videoSection">
                    <h3>📹 וידאו <span class="vid-controls"><button class="vid-btn" id="camStartBtn" onclick="startCamera()">הפעל מצלמה</button><button class="vid-btn hidden" id="vidToggle" onclick="toggleVideo()">📷</button><button class="vid-btn hidden" id="micToggle" onclick="toggleMic()">🎤</button></span></h3>
                    <div class="video-grid" id="videoGrid"><div class="vid-placeholder" id="vidPlaceholder">לחץ "הפעל מצלמה"</div></div>
                </div>
                <div class="sidebar-panel"><h3>📜 יומן</h3><div class="log-entries" id="logEntries"></div></div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="winModal"><div class="win-modal"><div class="big-icon">🏆</div><h2 id="winName">—</h2><p>ניצח את המשחק!</p><button class="btn btn-gold" onclick="location.reload()">משחק חדש</button></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
let MODE=null, sb=null, channel=null;
let G={players:[],pot:0,currentTurn:0,startAmt:100,ante:10,over:false};
let MY_ID=null, IS_HOST=false, ROOM_CODE=null, spinning=false;
let localStream=null, videoEnabled=false, micEnabled=true, peerConnections={};

const SB_URL='https://vhcxfrrafpqhvmmunoxp.supabase.co';
const SB_KEY='sb_publishable_4RWou7vJ8GdNXukaXduu5g_jd1LpyXN';

function connectSupabase(){try{sb=supabase.createClient(SB_URL,SB_KEY);show('onlineLobby');return true}catch(e){alert('שגיאה: '+e.message);return false}}

function selectMode(m){document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));document.querySelector(`.mode-card[data-mode="${m}"]`).classList.add('selected');MODE=m;document.getElementById('modeSelector').classList.add('collapsed');hide('localSetup');hide('onlineSetup');if(m==='local')show('localSetup');if(m==='online'){show('onlineSetup');if(!sb)connectSupabase()}}
function resetMode(){MODE=null;document.getElementById('modeSelector').classList.remove('collapsed');document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));hide('localSetup');hide('onlineSetup')}

function renderLocalNames(){const n=parseInt(document.getElementById('localNumPlayers').value);const d=document.getElementById('localNames');d.innerHTML='';for(let i=0;i<n;i++)d.innerHTML+=`<div class="player-name-row"><span class="badge">${i+1}</span><input class="input local-name" placeholder="שחקן ${i+1}"></div>`}
renderLocalNames();

function startLocalGame(){
    G.startAmt=parseInt(document.getElementById('localStartAmt').value)||100;G.ante=Math.round(G.startAmt*0.1);G.players=[];G.pot=0;G.currentTurn=0;G.over=false;
    document.querySelectorAll('.local-name').forEach((inp,i)=>{G.players.push({id:'p'+i,name:inp.value.trim()||`שחקן ${i+1}`,amount:G.startAmt-G.ante,alive:true,change:''});G.pot+=G.ante});
    hide('modeScreen');hide('localSetup');show('gameScreen');document.getElementById('videoSection').classList.add('hidden');
    document.getElementById('spinBtn').classList.remove('hidden');document.getElementById('waitingMsg').classList.add('hidden');
    addLog('המשחק התחיל! כל שחקן שם '+G.ante+' בקופה.');renderGame();
}

function showOnlineTab(t){document.getElementById('tabCreate').classList.toggle('active',t==='create');document.getElementById('tabJoin').classList.toggle('active',t==='join');toggle('createPanel',t==='create');toggle('joinPanel',t==='join')}
function genCode(){const c='ABCDEFGHJKLMNPRSTUVWXYZ23456789';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

async function createRoom(){
    const name=document.getElementById('hostName').value.trim()||'מארח';
    G.startAmt=parseInt(document.getElementById('onlineStartAmt').value)||100;G.ante=Math.round(G.startAmt*0.1);
    ROOM_CODE=genCode();MY_ID='p_'+Math.random().toString(36).substr(2,6);IS_HOST=true;
    G.players=[{id:MY_ID,name,amount:0,alive:true,change:''}];G.pot=0;G.currentTurn=0;G.over=false;
    hide('onlineLobby');show('waitingRoom');document.getElementById('roomCodeDisplay').textContent=ROOM_CODE;
    document.getElementById('startOnlineBtn').classList.remove('hidden');joinChannel();renderLobby();
}

async function joinRoom(){
    const name=document.getElementById('joinName').value.trim()||'שחקן';
    ROOM_CODE=document.getElementById('joinCode').value.trim().toUpperCase();
    if(!ROOM_CODE||ROOM_CODE.length<4){alert('קוד לא תקין');return}
    MY_ID='p_'+Math.random().toString(36).substr(2,6);IS_HOST=false;
    hide('onlineLobby');show('waitingRoom');document.getElementById('roomCodeDisplay').textContent=ROOM_CODE;
    document.getElementById('startOnlineBtn').classList.add('hidden');
    joinChannel(()=>{
        // Send join only after channel is subscribed
        channel.send({type:'broadcast',event:'player_join',payload:{id:MY_ID,name}});
        console.log('Sent player_join for',name,MY_ID);
    });
}

function joinChannel(onReady){
    channel=sb.channel('room_'+ROOM_CODE,{config:{broadcast:{self:true}}});
    channel.on('broadcast',{event:'player_join'},({payload})=>{
        if(IS_HOST&&!G.players.find(p=>p.id===payload.id)){G.players.push({id:payload.id,name:payload.name,amount:0,alive:true,change:''});broadcastState()}
        renderLobby();
    });
    channel.on('broadcast',{event:'game_state'},({payload})=>{
        G=payload;renderLobby();
        if(G.started){hide('waitingRoom');hide('modeScreen');hide('onlineSetup');show('gameScreen');show('videoSection');renderGame();updateOnlineUI()}
    });
    channel.on('broadcast',{event:'spin_result'},({payload})=>{
        if(payload.spinnerId===MY_ID)return;
        G=payload.state;
        showSpinAnimation(payload.letter,()=>{renderGame();updateOnlineUI();if(G.over)showWinner()});
    });
    channel.on('broadcast',{event:'game_log'},({payload})=>{addLogLocal(payload.text)});
    channel.on('broadcast',{event:'rtc_offer'},async({payload})=>{if(payload.target!==MY_ID)return;await handleOffer(payload.from,payload.offer)});
    channel.on('broadcast',{event:'rtc_answer'},async({payload})=>{if(payload.target!==MY_ID)return;await handleAnswer(payload.from,payload.answer)});
    channel.on('broadcast',{event:'rtc_ice'},async({payload})=>{if(payload.target!==MY_ID)return;await handleIce(payload.from,payload.candidate)});
    channel.on('broadcast',{event:'video_ready'},async({payload})=>{
        if(payload.id===MY_ID)return;
        if(localStream&&!peerConnections[payload.id]){await createPeerConnection(payload.id,true)}
    });
    channel.subscribe((status)=>{
        console.log('Channel status:',status);
        if(status==='SUBSCRIBED'&&onReady)onReady();
    });
}

function broadcastState(){channel.send({type:'broadcast',event:'game_state',payload:G})}
function renderLobby(){document.getElementById('lobbyPlayers').innerHTML=G.players.map((p,i)=>`<div class="lobby-player ${i===0?'host':''}"><span class="dot"></span> ${p.name}</div>`).join('')}

function startOnlineGame(){
    if(G.players.length<2){alert('צריך לפחות 2 שחקנים');return}
    G.players.forEach(p=>{p.amount=G.startAmt-G.ante;p.alive=true;p.change=''});
    G.pot=G.ante*G.players.length;G.currentTurn=0;G.over=false;G.started=true;
    broadcastState();addLog('המשחק התחיל! כל שחקן שם '+G.ante+' בקופה.');
}

function updateOnlineUI(){
    const myTurn=G.players[G.currentTurn]?.id===MY_ID;
    const btn=document.getElementById('spinBtn');btn.classList.toggle('hidden',!myTurn);btn.disabled=!myTurn;
    document.getElementById('waitingMsg').classList.toggle('hidden',myTurn);
}

const LETTERS=['נ','ג','ה','פ'];
const LDESC={'נ':'נון — ניקס (כלום)','ג':'גימל — גנץ (הכל!)','ה':'הא — האלב (חצי)','פ':'פה — פיי (לשלם)'};

function doSpin(){
    if(spinning||G.over)return;
    resetDreidel();
    const letter=LETTERS[Math.floor(Math.random()*4)];
    spinning=true;document.getElementById('spinBtn').disabled=true;G.players.forEach(p=>p.change='');
    if(MODE==='online'){
        applyLetter(letter);
        channel.send({type:'broadcast',event:'spin_result',payload:{letter,state:G,spinnerId:MY_ID}});
        showSpinAnimation(letter,()=>{renderGame();updateOnlineUI();spinning=false;document.getElementById('spinBtn').disabled=false;if(G.over)showWinner()});
    }else{
        showSpinAnimation(letter,()=>{applyLetter(letter);renderGame();spinning=false;document.getElementById('spinBtn').disabled=false;if(G.over)showWinner()});
    }
}

function showSpinAnimation(fl,cb){
    const svg=document.getElementById('dreidelSvg');
    const letterEl=document.getElementById('dreidelLetter');
    const rl=document.getElementById('resultLine');
    rl.textContent='';rl.className='result-line';
    
    // Reset any previous fall
    svg.classList.remove('fall-right','fall-left','upright');
    svg.style.transform='';
    
    // Start spinning
    svg.classList.add('spinning');
    const f=setInterval(()=>{letterEl.textContent=LETTERS[Math.floor(Math.random()*4)]},100);
    
    const spinDuration=1200+Math.random()*600;
    
    setTimeout(()=>{
        clearInterval(f);
        svg.classList.remove('spinning');
        letterEl.textContent=fl;
        rl.textContent=LDESC[fl];rl.className='result-line r-'+fl;
        
        // Fall to random side
        const fallRight=Math.random()>0.5;
        svg.classList.add(fallRight?'fall-right':'fall-left');
        
        // Callback after fall completes
        setTimeout(()=>{if(cb)cb()},650);
    },spinDuration);
}

// Stand the dreidel back up before next spin
function resetDreidel(){
    const svg=document.getElementById('dreidelSvg');
    svg.classList.remove('fall-right','fall-left');
    svg.classList.add('upright');
    setTimeout(()=>{svg.classList.remove('upright')},400);
}

function applyLetter(l){
    const p=G.players[G.currentTurn];G.players.forEach(pl=>pl.change='');
    switch(l){
        case'נ':p.change='—';addLog(`${p.name} ← נ׳ — כלום.`);break;
        case'ג':{const w=G.pot;p.amount+=G.pot;p.change='+'+w;G.pot=0;addLog(`${p.name} ← ג׳ — לקח ${w}! 🎉`);G.players.forEach(pl=>{if(pl.alive){pl.amount-=G.ante;G.pot+=G.ante}});addLog(`כולם שמו ${G.ante} בקופה.`);break}
        case'ה':{const h=Math.round(G.pot/2);p.amount+=h;G.pot-=h;p.change='+'+h;addLog(`${p.name} ← ה׳ — חצי (${h}).`);break}
        case'פ':p.amount-=G.ante;G.pot+=G.ante;p.change='-'+G.ante;addLog(`${p.name} ← פ׳ — שילם ${G.ante}.`);break;
    }
    G.players.forEach(pl=>{if(pl.alive&&pl.amount<=0){pl.alive=false;pl.amount=0;addLog(`💀 ${pl.name} יצא!`)}});
    const alive=G.players.filter(p=>p.alive);
    if(alive.length<=1){G.over=true;if(alive[0]){alive[0].amount+=G.pot;G.pot=0}return}
    do{G.currentTurn=(G.currentTurn+1)%G.players.length}while(!G.players[G.currentTurn].alive);
    if(G.pot===0){G.players.forEach(pl=>{if(pl.alive){pl.amount-=G.ante;G.pot+=G.ante}});G.players.forEach(pl=>{if(pl.alive&&pl.amount<=0){pl.alive=false;pl.amount=0;addLog(`💀 ${pl.name} יצא!`)}})}
}

function renderGame(){
    document.getElementById('potVal').textContent=G.pot;
    const cp=G.players[G.currentTurn];document.getElementById('turnBox').innerHTML=`תור: <strong>${cp?cp.name:'—'}</strong>`;
    document.getElementById('playersGrid').innerHTML=G.players.map((p,i)=>`
        <div class="p-card ${i===G.currentTurn&&p.alive?'active':''} ${!p.alive?'out':''} ${G.over&&p.alive?'winner':''}">
            <div class="p-name"><span class="crown">👑</span>${p.name}${!p.alive?' (בחוץ)':''}</div>
            <div class="p-amt">${p.alive?p.amount:0}</div>
            <div class="p-delta ${p.change.startsWith('+')?'plus':p.change.startsWith('-')?'minus':'zero'}">${p.change}</div>
        </div>`).join('');
}

function showWinner(){const w=G.players.find(p=>p.alive);if(w){document.getElementById('winName').textContent='🎉 '+w.name+' ניצח!';document.getElementById('winModal').classList.add('show');addLog(`🏆 ${w.name} ניצח עם ${w.amount}!`)}}

function addLog(text){addLogLocal(text);if(MODE==='online'&&channel)channel.send({type:'broadcast',event:'game_log',payload:{text}})}
function addLogLocal(text){const el=document.createElement('div');el.className='log-entry';el.textContent=text;const c=document.getElementById('logEntries');if(c.firstChild&&c.firstChild.textContent===text)return;c.insertBefore(el,c.firstChild)}

// ══ WebRTC ══
const RTC_CFG={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function startCamera(){
    try{
        localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
        videoEnabled=true;micEnabled=true;
        document.getElementById('vidPlaceholder').classList.add('hidden');
        document.getElementById('camStartBtn').classList.add('hidden');
        document.getElementById('vidToggle').classList.remove('hidden');
        document.getElementById('micToggle').classList.remove('hidden');
        addLocalVideo();updateVidBtns();
        if(MODE==='online'&&channel){
            channel.send({type:'broadcast',event:'video_ready',payload:{id:MY_ID}});
            initVideoConnections();
        }
    }catch(e){console.error('Camera:',e);alert('לא ניתן לגשת למצלמה. בדוק הרשאות.')}
}

function addLocalVideo(){
    const g=document.getElementById('videoGrid');if(document.getElementById('vid_local'))return;
    const t=document.createElement('div');t.className='video-tile';t.id='vid_local';
    t.innerHTML='<video autoplay muted playsinline></video><div class="vid-name">אני</div>';
    g.appendChild(t);t.querySelector('video').srcObject=localStream;
}

async function initVideoConnections(){
    const mi=G.players.findIndex(p=>p.id===MY_ID);
    for(let i=0;i<G.players.length;i++){if(i===mi)continue;const pid=G.players[i].id;if(peerConnections[pid])continue;if(mi<i)await createPeerConnection(pid,true)}
}

async function createPeerConnection(pid,init){
    if(!localStream)return;
    const pc=new RTCPeerConnection(RTC_CFG);peerConnections[pid]=pc;
    localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.onicecandidate=e=>{if(e.candidate)channel.send({type:'broadcast',event:'rtc_ice',payload:{from:MY_ID,target:pid,candidate:e.candidate}})};
    pc.ontrack=e=>addRemoteVideo(pid,e.streams[0]);
    if(init){const o=await pc.createOffer();await pc.setLocalDescription(o);channel.send({type:'broadcast',event:'rtc_offer',payload:{from:MY_ID,target:pid,offer:o}})}
}

async function handleOffer(from,offer){
    if(!localStream)await startCamera();if(!localStream)return;
    if(!peerConnections[from])await createPeerConnection(from,false);
    const pc=peerConnections[from];await pc.setRemoteDescription(new RTCSessionDescription(offer));
    const a=await pc.createAnswer();await pc.setLocalDescription(a);
    channel.send({type:'broadcast',event:'rtc_answer',payload:{from:MY_ID,target:from,answer:a}});
}
async function handleAnswer(from,a){const pc=peerConnections[from];if(pc)await pc.setRemoteDescription(new RTCSessionDescription(a))}
async function handleIce(from,c){const pc=peerConnections[from];if(pc)await pc.addIceCandidate(new RTCIceCandidate(c))}

function addRemoteVideo(pid,stream){
    const g=document.getElementById('videoGrid');if(document.getElementById('vid_'+pid))return;
    document.getElementById('vidPlaceholder')?.classList.add('hidden');
    const p=G.players.find(p=>p.id===pid);const t=document.createElement('div');t.className='video-tile';t.id='vid_'+pid;
    t.innerHTML=`<video autoplay playsinline></video><div class="vid-name">${p?p.name:pid}</div>`;
    g.appendChild(t);t.querySelector('video').srcObject=stream;
}

function toggleVideo(){if(!localStream)return;videoEnabled=!videoEnabled;localStream.getVideoTracks().forEach(t=>t.enabled=videoEnabled);updateVidBtns()}
function toggleMic(){if(!localStream)return;micEnabled=!micEnabled;localStream.getAudioTracks().forEach(t=>t.enabled=micEnabled);updateVidBtns()}
function updateVidBtns(){
    document.getElementById('vidToggle').textContent=videoEnabled?'📷 כבה':'📷 הפעל';
    document.getElementById('vidToggle').classList.toggle('active',videoEnabled);
    document.getElementById('micToggle').textContent=micEnabled?'🎤 השתק':'🔇 בטל';
    document.getElementById('micToggle').classList.toggle('active',micEnabled);
}

function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
function toggle(id,v){document.getElementById(id).classList.toggle('hidden',!v)}
</script>
